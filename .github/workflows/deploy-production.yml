name: Deploy Production

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true # Cancel previous runs for the same branch

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04-arm
    outputs:
      src: ${{ steps.filter.outputs.src }}
      db: ${{ steps.filter.outputs.db }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'public/**'
              - '!src/tests/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'drizzle.config.ts'
              - 'next.config.ts'
              - 'postcss.config.cjs'
              - 'tsconfig.json'
            db:
              - 'src/server/db/migrations/**'
              - 'drizzle.config.ts'
            tests:
              - 'src/tests/**'
              - '**/*.test.*'
              - '**/*.spec.*'
              - 'bunfig.toml'

  quality:
    name: Code quality
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.tests == 'true'
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        check: [lint, typecheck, test-unit]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Biome
        if: matrix.check == 'lint'
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2
        with:
          version: "2.4.11"
      - name: Setup dependencies
        if: matrix.check != 'lint'
        uses: ./.github/workflows/setup
      - name: Setup Bun
        if: matrix.check == 'test-unit'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - name: Setup test env
        if: matrix.check == 'test-unit'
        run: |
          cp .env.example .env
          echo SKIP_ENV_VALIDATION=1 >> .env
      - run: |
          case "${{ matrix.check }}" in
            lint)      biome ci . ;;
            typecheck) pnpm run typecheck ;;
            test-unit) pnpm run test ;;
          esac

  # test-e2e:
  #   needs: changes
  #   if: needs.changes.outputs.src == 'true'
  #   runs-on: ubuntu-24.04-arm
  #   strategy:
  #     fail-fast: false
  #     matrix:
  #       shard: [1, 2, 3]
  #   steps:
  #     - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
  #     - uses: ./.github/workflows/setup
  #     - run: pnpm dlx playwright install --with-deps chromium
  #     - run: pnpm dlx playwright test --shard=${{ matrix.shard }}/3

  deploy_app:
    name: Deploy App
    environment: production
    needs: [changes, quality]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/workflows/setup

      - name: 📤 Pull Vercel Environment Information
        run: |
          pnpm dlx vercel env pull .env --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          echo "SKIP_ENV_VALIDATION=1" >> .env
          pnpm dlx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🐘 Apply Migrations
        if: needs.changes.outputs.db == 'true'
        run: pnpm run db:migrate

      - name: 📦 Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.css') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: 🏗 Build Project Artifacts
        run: pnpm dlx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy Project Artifacts to Vercel
        run: pnpm dlx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
